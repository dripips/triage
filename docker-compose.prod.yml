# Production override для docker-compose.yml.
# Использование:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Что меняет vs основной compose:
#   • app использует pre-built image (а не локальный build) — pull из registry
#   • Прокидывается APP_BASE_URL для Telegram-webhook и т.п.
#   • restart: always (а не unless-stopped) — для prod-сервера
#   • Логи: json-file driver с rotation
#   • Healthcheck на app
#   • PG: shared_buffers / work_mem tuning для prod
#
# Перед запуском задай в .env:
#   APP_HOST=triage.example.com
#   APP_BASE_URL=https://triage.example.com
#   APP_IMAGE=ghcr.io/dripips/rubby-triage:v2.0
#   POSTGRES_PASSWORD=<сильный пароль>
#   RAILS_MASTER_KEY=<из config/master.key>

services:
  db:
    restart: always
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=16MB
      -c effective_cache_size=1GB
      -c max_connections=200
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  app:
    image: ${APP_IMAGE:-triage:latest}
    restart: always
    build: !reset null   # отключаем local build, используем pre-built
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      APP_HOST: ${APP_HOST}
      APP_BASE_URL: ${APP_BASE_URL}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgres://triage:${POSTGRES_PASSWORD}@db:5432/triage_production
      # Tune Puma для prod
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-10}
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:80/up || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "10" }

  worker:
    image: ${APP_IMAGE:-triage:latest}
    restart: always
    build: !reset null
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgres://triage:${POSTGRES_PASSWORD}@db:5432/triage_production
      SOLID_QUEUE_IN_PUMA: "false"
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "10" }
