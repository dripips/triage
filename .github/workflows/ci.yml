name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  scan_ruby:
    name: Security scan (Ruby)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Brakeman (Rails static analysis)
        run: bin/brakeman --no-pager

      - name: Bundler audit (gem CVEs)
        run: bin/bundler-audit

  scan_js:
    name: Security scan (JavaScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Importmap audit
        run: bin/importmap audit

  lint:
    name: Lint (Rubocop)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run Rubocop
        run: bin/rubocop --no-color

  test:
    name: Tests (RSpec)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      RAILS_ENV: test
      HRMS_DATABASE_HOST: localhost
      HRMS_DATABASE_PORT: "5432"
      HRMS_DATABASE_USERNAME: postgres
      HRMS_DATABASE_PASSWORD: postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare database
        run: bin/rails db:test:prepare

      - name: Zeitwerk autoload check (catches class-naming mismatches)
        run: bin/rails zeitwerk:check

      - name: Run RSpec (incl. smoke spec)
        run: bundle exec rspec --format documentation
